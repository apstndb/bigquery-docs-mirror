# settings.toml: Configuration for the documentation mirror

# Discovery entry points
seeds = [
    "https://docs.cloud.google.com/bigquery/docs",
    "https://docs.cloud.google.com/bigquery/docs/reference/bq-cli-reference",
    "https://cloud.google.com/bigquery",
]

# Path prefixes to mirror
# Keep the documentation and product-site corpora distinct.
prefixes = [
    "docs.cloud.google.com/bigquery/",
    # Legacy documentation links are probed for redirects, but product-site
    # descendants such as pricing are not recursively enqueued.
    "cloud.google.com/bigquery/docs/",
]

# Sitemap URL(s) to discover links
# sitemaps = ["https://cloud.google.com/sitemap.xml"]

# Recursive discovery from Markdown content
recursive = true

# Rate limiting: requests per minute (default: 50.0)
# qpm = 50.0

# Wait duration when quota is exceeded (default: 1m10s)
# qw = "1m10s"
